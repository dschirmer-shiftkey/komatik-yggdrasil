# Yggdrasil Seed — Docker Compose Template
#
# Boots a fully operational Seed with one command:
#   docker compose --project-directory . \
#     -f infrastructure/compose.yaml \
#     -f seedlings/001-energy/config/compose.override.yaml up
#
# Prerequisites:
#   cp .env.example .env   # fill in API keys and passwords
#
# Each Seed extends this base with mission-specific overrides.

x-agent-common: &agent-common
  build:
    context: ./agent
    dockerfile: Dockerfile
  depends_on:
    gateway:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - agent-net
    - backend-net  # direct DB access; migrate to gateway API in future
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "0.5"

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: seed-gateway
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    environment:
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - NODE_ENV=production
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - ./config/rbac-policies.yaml:/workspace/config/rbac-policies.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend-net
      - agent-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  agent-mission:
    <<: *agent-common
    container_name: seed-agent-mission
    environment:
      - AGENT_ROLE=mission
      - AGENT_ID=mission
      - GATEWAY_URL=http://gateway:18789
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - BIFROST_URL=http://bifrost:8080
      - BIFROST_API_KEY=${SEED_VIRTUAL_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
      - SOURCE_ID=${SOURCE_ID}
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - mission:/workspace/mission:ro
      - ./config/context-budget.yaml:/workspace/config/context-budget.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro

  agent-research:
    <<: *agent-common
    container_name: seed-agent-research
    environment:
      - AGENT_ROLE=research
      - AGENT_ID=research
      - GATEWAY_URL=http://gateway:18789
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - BIFROST_URL=http://bifrost:8080
      - BIFROST_API_KEY=${SEED_VIRTUAL_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
      - SOURCE_ID=${SOURCE_ID}
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - mission:/workspace/mission:ro
      - ./config/context-budget.yaml:/workspace/config/context-budget.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro

  agent-analysis:
    <<: *agent-common
    container_name: seed-agent-analysis
    environment:
      - AGENT_ROLE=analysis
      - AGENT_ID=analysis
      - GATEWAY_URL=http://gateway:18789
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - BIFROST_URL=http://bifrost:8080
      - BIFROST_API_KEY=${SEED_VIRTUAL_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
      - SOURCE_ID=${SOURCE_ID}
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - mission:/workspace/mission:ro
      - ./config/context-budget.yaml:/workspace/config/context-budget.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro

  agent-prototype:
    <<: *agent-common
    container_name: seed-agent-prototype
    environment:
      - AGENT_ROLE=prototype
      - AGENT_ID=prototype
      - GATEWAY_URL=http://gateway:18789
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - BIFROST_URL=http://bifrost:8080
      - BIFROST_API_KEY=${SEED_VIRTUAL_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
      - SOURCE_ID=${SOURCE_ID}
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - mission:/workspace/mission:ro
      - ./config/context-budget.yaml:/workspace/config/context-budget.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro

  agent-documentation:
    <<: *agent-common
    container_name: seed-agent-documentation
    environment:
      - AGENT_ROLE=documentation
      - AGENT_ID=documentation
      - GATEWAY_URL=http://gateway:18789
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - BIFROST_URL=http://bifrost:8080
      - BIFROST_API_KEY=${SEED_VIRTUAL_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
      - SOURCE_ID=${SOURCE_ID}
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - mission:/workspace/mission:ro
      - ./config/context-budget.yaml:/workspace/config/context-budget.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro

  agent-community:
    <<: *agent-common
    container_name: seed-agent-community
    environment:
      - AGENT_ROLE=community
      - AGENT_ID=community
      - GATEWAY_URL=http://gateway:18789
      - WORKSPACE_PATH=/workspace
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - BIFROST_URL=http://bifrost:8080
      - BIFROST_API_KEY=${SEED_VIRTUAL_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
      - SOURCE_ID=${SOURCE_ID}
    volumes:
      - workspace:/workspace
      - output:/workspace/output
      - mission:/workspace/mission:ro
      - ./config/context-budget.yaml:/workspace/config/context-budget.yaml:ro
      - ./config/agent-capacity.yaml:/workspace/config/agent-capacity.yaml:ro

  bifrost:
    build:
      context: ./bifrost
      dockerfile: Dockerfile
    container_name: seed-bifrost
    ports:
      - "${BIFROST_PORT:-8080}:8080"
    volumes:
      - ./bifrost/config.template.json:/app/config.template.json:ro
    environment:
      - CONFIG_PATH=/app/config.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SEED_VIRTUAL_KEY=${SEED_VIRTUAL_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - agent-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  db:
    image: postgres:16-alpine
    container_name: seed-db
    environment:
      - POSTGRES_DB=seedling
      - POSTGRES_USER=seedling
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gateway/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedling -d seedling"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: seed-scheduler
    environment:
      - GATEWAY_URL=http://gateway:18789
      - CYCLE_INTERVAL_MINUTES=${CYCLE_INTERVAL_MINUTES:-60}
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  publisher:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    container_name: seed-publisher
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - SEED_NAME=${SEED_NAME}
      - SEED_DIR=${SEED_DIR}
      - DATABASE_URL=postgresql://seedling:${POSTGRES_PASSWORD}@db:5432/seedling
      - PUBLISH_INTERVAL_MINUTES=${PUBLISH_INTERVAL_MINUTES:-30}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SOURCE_TYPE=${SOURCE_TYPE:-seed}
      - SOURCE_ID=${SOURCE_ID}
      - CATEGORY_ID=${CATEGORY_ID}
      - ROOT_ID=${ROOT_ID}
    volumes:
      - output:/workspace/output
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  pgdata:
    driver: local
  workspace:
    driver: local
  output:
    driver: local
  mission:
    driver: local

networks:
  backend-net:
    driver: bridge
  agent-net:
    driver: bridge
