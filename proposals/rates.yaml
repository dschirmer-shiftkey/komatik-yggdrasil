  pop_months: 6
  scaffolded_total_estimate_usd: 188962
  headroom_usd: 36038
  note: "Scaffold total $188,962 carries forward from ASEMA Vol 3. NOT the NASA Phase I budget — placeholder pending re-build against Appendix 2026A SOW. Use cost-volume-phase1.md template once gate parse passes."
  confirm:
    - "Re-build full cost narrative against NASA SOW once gate-0 / gate-1 parse complete (Wed AM). Do NOT carry the ASEMA $188,962 forward as a number — only as a working-capacity sanity check."

# ---------- DOCUMENTATION REQUIREMENTS ----------
# What David needs to produce or have on hand for cost-volume defense.

documentation_required:
  - item: "Latent Space LLC payroll history or owner-PI rate resolution"
    status: "[CONFIRM: David — exists? If no formal payroll, board resolution setting PI rate is the standard substitute]"
  - item: "2025 indirect cost pool reconciliation"
    status: "[CONFIRM: David — books closed for 2025? Indirect pool calculable?]"
  - item: "Health/retirement benefit documentation for fringe substantiation"
    status: "[CONFIRM: David — what's actually being paid into health/retirement from LLC]"
  - item: "Quotes or pricing for any planned ODC (cloud, software, travel)"
    status: "[CONFIRM: David — current vendor pricing pages or recent invoices]"
  - item: "Any prior NICRA — federal indirect rate agreement"
    status: "[CONFIRM: David — does Latent Space hold any NICRA from any agency? Almost certainly no, but must be confirmed before claiming pre-NICRA status]"
