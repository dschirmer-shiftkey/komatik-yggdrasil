# Seedling 002: Homelessness LA — Docker Compose Override
#
# Extends the base infrastructure/compose.yaml with Homelessness LA config.
#
# Usage:
#   docker compose --project-directory . \
#     -f infrastructure/compose.yaml \
#     -f seedlings/002-homelessness-la/config/compose.override.yaml up
#
# NOTE: Bind-mount paths are relative to the project directory (infrastructure/)
# because that is the location of the first -f compose file.

services:
  agent-mission:
    environment:
      - SEEDLING_NAME=Homelessness LA
    volumes:
      - ../seedlings/002-homelessness-la/MISSION.md:/workspace/mission/MISSION.md:ro
      - ./agent/souls/mission.md:/workspace/souls/mission.md:ro
      - ../seedlings/002-homelessness-la/config/agents/mission.yaml:/workspace/config/agent.yaml:ro
      - ../branches/homelessness:/workspace/branch:ro

  agent-research:
    environment:
      - SEEDLING_NAME=Homelessness LA
    volumes:
      - ../seedlings/002-homelessness-la/MISSION.md:/workspace/mission/MISSION.md:ro
      - ./agent/souls/research.md:/workspace/souls/research.md:ro
      - ../seedlings/002-homelessness-la/config/agents/research.yaml:/workspace/config/agent.yaml:ro
      - ../branches/homelessness:/workspace/branch:ro

  agent-analysis:
    environment:
      - SEEDLING_NAME=Homelessness LA
    volumes:
      - ../seedlings/002-homelessness-la/MISSION.md:/workspace/mission/MISSION.md:ro
      - ./agent/souls/analysis.md:/workspace/souls/analysis.md:ro
      - ../seedlings/002-homelessness-la/config/agents/analysis.yaml:/workspace/config/agent.yaml:ro
      - ../branches/homelessness:/workspace/branch:ro

  agent-prototype:
    environment:
      - SEEDLING_NAME=Homelessness LA
    volumes:
      - ../seedlings/002-homelessness-la/MISSION.md:/workspace/mission/MISSION.md:ro
      - ./agent/souls/prototype.md:/workspace/souls/prototype.md:ro
      - ../seedlings/002-homelessness-la/config/agents/prototype.yaml:/workspace/config/agent.yaml:ro
      - ../branches/homelessness:/workspace/branch:ro

  agent-documentation:
    environment:
      - SEEDLING_NAME=Homelessness LA
    volumes:
      - ../seedlings/002-homelessness-la/MISSION.md:/workspace/mission/MISSION.md:ro
      - ./agent/souls/documentation.md:/workspace/souls/documentation.md:ro
      - ../seedlings/002-homelessness-la/config/agents/documentation.yaml:/workspace/config/agent.yaml:ro
      - ../branches/homelessness:/workspace/branch:ro

  agent-community:
    environment:
      - SEEDLING_NAME=Homelessness LA
    volumes:
      - ../seedlings/002-homelessness-la/MISSION.md:/workspace/mission/MISSION.md:ro
      - ./agent/souls/community.md:/workspace/souls/community.md:ro
      - ../seedlings/002-homelessness-la/config/agents/community.yaml:/workspace/config/agent.yaml:ro
      - ../branches/homelessness:/workspace/branch:ro

  publisher:
    environment:
      - SEEDLING_NAME=Homelessness LA
      - SEEDLING_DIR=seedlings/002-homelessness-la

  bifrost:
    volumes:
      - ../seedlings/002-homelessness-la/config/bifrost.json:/app/config.template.json:ro
