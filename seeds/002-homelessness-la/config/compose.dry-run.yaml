# Seed 002 Homelessness LA — DRY-RUN Compose Override
#
# Phase 2 of the first-live-cycle plan. Layers on top of the base compose
# and the seed override to:
#   - Disable the publisher (no GitHub pushes)
#   - Cap the next cycle interval at one year (effectively single-cycle)
#   - Mount the dry-run Bifrost config (OpenRouter only)
#   - Mount dry-run agent YAMLs (openrouter/google/gemini-2.0-flash-001)
#
# Boot (from repo root):
#   docker compose --project-directory infrastructure \
#     -f infrastructure/compose.yaml \
#     -f seeds/002-homelessness-la/config/compose.override.yaml \
#     -f seeds/002-homelessness-la/config/compose.dry-run.yaml up
#
# See seeds/002-homelessness-la/config/dry-run/README.md for the runbook.

services:
  publisher:
    deploy:
      replicas: 0

  scheduler:
    environment:
      - CYCLE_INTERVAL_MINUTES=525960

  bifrost:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/bifrost.json:/app/config.template.json:ro
    environment: !override
      - CONFIG_PATH=/app/data/config.json
      - CONFIG_TEMPLATE_PATH=/app/config.template.json
      - BIFROST_RESET_CONFIG=true
      - BIFROST_BOOTSTRAP=false
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SEED_VIRTUAL_KEY=${SEED_VIRTUAL_KEY}

  agent-mission:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/mission.yaml:/workspace/config/agent.yaml:ro

  agent-research:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/research.yaml:/workspace/config/agent.yaml:ro

  agent-analysis:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/analysis.yaml:/workspace/config/agent.yaml:ro

  agent-prototype:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/prototype.yaml:/workspace/config/agent.yaml:ro

  agent-documentation:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/documentation.yaml:/workspace/config/agent.yaml:ro

  agent-community:
    volumes:
      - ../seeds/002-homelessness-la/config/dry-run/community.yaml:/workspace/config/agent.yaml:ro
