# tree.yaml — Yggdrasil World Tree Registry
#
# Single source of truth for the tree hierarchy.
# komatik.ai website consumes this at build time via GitHub raw content.
# CI validates that every seedling listed here has a matching directory.
#
# THE WORLD TREE
#   Yggdrasil  = The world tree (this initiative)
#   Trunks     = Broad categories (Basic Needs, Human Growth, Planet & Life, Society & Systems)
#   Branches   = Problem domains (Energy, Housing, Health, etc.)
#   Seedlings  = Geographically scoped instances on a branch
#
# ROOT TRIMMING — Granularity Governance
#   Each branch defines a `scope_floor` — the minimum geographic scope for
#   a seedling. Below this level, contributors join an existing seedling
#   rather than creating a new one. See CONTRIBUTING.md for the full policy.
#
#   Overlap rules:
#     Narrower than floor          → Redirect to existing seedling
#     Same scope, same geography   → Contribute to existing seedling
#     Broader scope, contains existing → Merge discussion
#     Same scope, non-overlapping  → Allow (new seedling)

trunks:

  # ─────────────────────────────────────────────────────────────────────
  # BASIC NEEDS — Survival-level problems: what every human requires
  # ─────────────────────────────────────────────────────────────────────
  basic-needs:
    name: "Basic Needs"
    description: "Survival-level problems — energy, shelter, food, water, health."
    branches:

      energy:
        name: "Energy"
        description: "Solving energy poverty through distributed renewable generation, open hardware, and community microgrids."
        icon: "zap"
        sdgs: [7]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings:
          - "001-energy"

      housing:
        name: "Housing"
        description: "Reducing homelessness and expanding affordable housing through data-driven research and evidence-based interventions."
        icon: "home"
        sdgs: [1, 11]
        scope_floor: "metro"
        scope_levels: ["global", "continental", "national", "state", "metro"]
        seedlings:
          - "002-homelessness-la"

      hunger:
        name: "Hunger"
        description: "Reducing food insecurity, food loss, and malnutrition through open agricultural technology and supply chain optimization."
        icon: "wheat"
        sdgs: [2]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

      water:
        name: "Water"
        description: "Open-source water purification, collection, and sanitation systems for communities without safe water access."
        icon: "droplets"
        sdgs: [6]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

      health:
        name: "Health"
        description: "Open diagnostic tools, treatment protocols, and health system strengthening for under-resourced medical settings."
        icon: "heart-pulse"
        sdgs: [3]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

  # ─────────────────────────────────────────────────────────────────────
  # HUMAN GROWTH — Development, opportunity, and dignity
  # ─────────────────────────────────────────────────────────────────────
  human-growth:
    name: "Human Growth"
    description: "Education, economic opportunity, and equality — the foundations of human development."
    branches:

      education:
        name: "Education"
        description: "AI-native learning tools, literacy programs, and vocational training for limited-infrastructure regions."
        icon: "graduation-cap"
        sdgs: [4]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

      economic-opportunity:
        name: "Economic Opportunity"
        description: "Poverty reduction through microfinance research, fair trade analysis, job creation modeling, and open economic tools."
        icon: "trending-up"
        sdgs: [1, 8]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

      equality:
        name: "Equality"
        description: "Evidence-based research on reducing gender, racial, and disability inequalities in access to services and opportunity."
        icon: "scale"
        sdgs: [5, 10]
        scope_floor: "national"
        scope_levels: ["global", "continental", "national"]
        seedlings: []

  # ─────────────────────────────────────────────────────────────────────
  # PLANET & LIFE — Environmental stewardship
  # ─────────────────────────────────────────────────────────────────────
  planet-and-life:
    name: "Planet & Life"
    description: "Climate action, ocean health, and ecosystem preservation."
    branches:

      climate:
        name: "Climate"
        description: "Community-scale carbon sequestration, climate adaptation strategies, and resilience planning."
        icon: "thermometer-sun"
        sdgs: [13]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

      oceans:
        name: "Oceans"
        description: "Marine conservation, plastic pollution reduction, sustainable fisheries, and coastal ecosystem protection."
        icon: "waves"
        sdgs: [14]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region"]
        seedlings: []

      ecosystems:
        name: "Ecosystems"
        description: "Biodiversity preservation, reforestation, soil health, and wildlife conservation through open monitoring and modeling."
        icon: "trees"
        sdgs: [15]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

  # ─────────────────────────────────────────────────────────────────────
  # SOCIETY & SYSTEMS — Structural and institutional challenges
  # ─────────────────────────────────────────────────────────────────────
  society-and-systems:
    name: "Society & Systems"
    description: "Peace, governance, community connection, and digital access."
    branches:

      peace:
        name: "Peace"
        description: "Conflict resolution, refugee support, governance transparency, and anti-corruption research."
        icon: "shield"
        sdgs: [16]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seedlings: []

      community:
        name: "Community"
        description: "Bridging divided communities through evidence-based dialogue, civic engagement, and cultural preservation."
        icon: "users"
        sdgs: [11]
        scope_floor: "metro"
        scope_levels: ["global", "continental", "national", "state", "metro"]
        seedlings: []

      digital-access:
        name: "Digital Access"
