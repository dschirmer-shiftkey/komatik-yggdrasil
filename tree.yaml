# tree.yaml — Yggdrasil World Tree Registry
#
# Single source of truth for the tree hierarchy.
# komatik.ai website consumes this at build time via GitHub raw content.
# CI validates that every seed listed here has a matching directory.
#
# THE WORLD TREE
#   Yggdrasil  = The world tree (this initiative)
#   Roots      = Broad categories (Basic Needs, Human Growth, Planet & Life, Society & Systems)
#   Categories = Problem domains (Energy, Housing, Health, etc.)
#   Seeds      = Geographically scoped instances on a category
#
# ROOT TRIMMING — Granularity Governance
#   Each category defines a `scope_floor` — the minimum geographic scope for
#   a seed. Below this level, contributors join an existing seed
#   rather than creating a new one. See CONTRIBUTING.md for the full policy.
#
#   Overlap rules:
#     Narrower than floor          → Redirect to existing seed
#     Same scope, same geography   → Contribute to existing seed
#     Broader scope, contains existing → Merge discussion
#     Same scope, non-overlapping  → Allow (new seed)

# ─────────────────────────────────────────────────────────────────────
# APEX — Yggdrasil HQ
# The single container above the four Roots. Cross-root synthesis,
# mission guardian against docs/charter.md, Contention Map aggregation,
# Public Signal routing. See apex/apex.yaml for the spec.
# ─────────────────────────────────────────────────────────────────────
apex:
  id: "apex"
  name: "Yggdrasil HQ"
  description: "Cross-root synthesis, Mission Guardian (charter drift), Contention Map aggregation, Public Signal routing."
  charter: "docs/charter.md"
  watches_roots:
    - basic-needs
    - human-growth
    - planet-and-life
    - society-and-systems

roots:

  # ─────────────────────────────────────────────────────────────────────
  # BASIC NEEDS — Survival-level problems: what every human requires
  # ─────────────────────────────────────────────────────────────────────
  basic-needs:
    name: "Basic Needs"
    description: "Survival-level problems — energy, shelter, food, water, health."
    categories:

      energy:
        name: "Energy"
        description: "Solving energy poverty through distributed renewable generation, open hardware, and community microgrids."
        icon: "zap"
        sdgs: [7]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seeds:
          - "001-energy"

      housing:
        name: "Housing"
        description: "Reducing homelessness and expanding affordable housing through data-driven research and evidence-based interventions."
        icon: "home"
        sdgs: [1, 11]
        scope_floor: "metro"
        scope_levels: ["global", "continental", "national", "state", "metro"]
        seeds:
          - "002-homelessness-la"

      hunger:
        name: "Hunger"
        description: "Reducing food insecurity, food loss, and malnutrition through open agricultural technology and supply chain optimization."
        icon: "wheat"
        sdgs: [2]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

      water:
        name: "Water"
        description: "Open-source water purification, collection, and sanitation systems for communities without safe water access."
        icon: "droplets"
        sdgs: [6]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

      health:
        name: "Health"
        description: "Physical and behavioral health — open diagnostics, treatment protocols, mental health, addiction, elder care, and health system strengthening."
        icon: "heart-pulse"
        sdgs: [3]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

  # ─────────────────────────────────────────────────────────────────────
  # HUMAN GROWTH — Development, opportunity, and dignity
  # ─────────────────────────────────────────────────────────────────────
  human-growth:
    name: "Human Growth"
    description: "Education, economic opportunity, and equality — the foundations of human development."
    categories:

      education:
        name: "Education"
        description: "AI-native learning tools, literacy programs, and vocational training for limited-infrastructure regions."
        icon: "graduation-cap"
        sdgs: [4]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

      economic-opportunity:
        name: "Economic Opportunity"
        description: "Poverty reduction through microfinance research, fair trade analysis, job creation modeling, and open economic tools."
        icon: "trending-up"
        sdgs: [1, 8]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

      equality:
        name: "Equality"
        description: "Evidence-based research on reducing gender, racial, and disability inequalities in access to services and opportunity."
        icon: "scale"
        sdgs: [5, 10]
        scope_floor: "national"
        scope_levels: ["global", "continental", "national"]
        seeds: []

  # ─────────────────────────────────────────────────────────────────────
  # PLANET & LIFE — Environmental stewardship
  # ─────────────────────────────────────────────────────────────────────
  planet-and-life:
    name: "Planet & Life"
    description: "Climate action, ocean health, and ecosystem preservation."
    categories:

      climate:
        name: "Climate"
        description: "Carbon sequestration, climate adaptation, disaster resilience, early warning systems, and community resilience planning."
        icon: "thermometer-sun"
        sdgs: [13]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

      oceans:
        name: "Oceans"
        description: "Marine conservation, plastic pollution reduction, sustainable fisheries, and coastal ecosystem protection."
        icon: "waves"
        sdgs: [14]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region"]
        seeds: []

      ecosystems:
        name: "Ecosystems"
        description: "Biodiversity preservation, reforestation, soil health, and wildlife conservation through open monitoring and modeling."
        icon: "trees"
        sdgs: [15]
        scope_floor: "region"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

  # ─────────────────────────────────────────────────────────────────────
  # SOCIETY & SYSTEMS — Structural and institutional challenges
  # ─────────────────────────────────────────────────────────────────────
  society-and-systems:
    name: "Society & Systems"
    description: "Peace, governance, community connection, and digital access."
    categories:

      peace:
        name: "Peace"
        description: "Conflict resolution, refugee support, governance transparency, and anti-corruption research."
        icon: "shield"
        sdgs: [16]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []

      community:
        name: "Community"
        description: "Everything that makes a place livable — civic engagement, cultural preservation, arts and heritage, animal welfare, disaster preparedness, transportation and mobility, urban planning, and public spaces."
        icon: "users"
        sdgs: [11]
        scope_floor: "metro"
        scope_levels: ["global", "continental", "national", "state", "metro"]
        seeds: []

      digital-access:
        name: "Digital Access"
        description: "Closing the digital divide through open infrastructure, connectivity research, and information access tools."
        icon: "wifi"
        sdgs: [9]
        scope_floor: "national"
        scope_levels: ["global", "continental", "region", "national"]
        seeds: []
